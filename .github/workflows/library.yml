name: Library CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Change wrapper permissions
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew test
      - name: Upload library artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openhardwaremonitor-web-client-artifacts
          path: |
            build/libs/*
            build/publications/**

  publish:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Change wrapper permissions
        run: chmod +x ./gradlew
      - name: Publish package
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish -PreleaseVersion=${{ github.event.release.tag_name || github.ref_name }}
